body:
  text: 馬王堆漢墓帛書雜禁方釋文又犬善皋於亶與門又犬善皋於亶與門𡌘井上方五尺𡌘井上方五尺夫妻相惡夫妻相惡𡌘戶方五尺𡌘戶方五尺欲微貴人欲微貴人𡌘門左右方五尺𡌘門左右方五尺多惡薨多惡薨𡌘牀下方七尺𡌘牀下方七尺姑婦善𧯞姑婦善𧯞𡌘戶方五尺𡌘戶方五尺嬰兒善泣嬰兒善泣塗上方五尺塗上方五尺與人訟與人訟書其名直履中書其名直履中取兩雌隹尾取兩雌隹尾燔冶燔冶自飲之自飲之媚矣媚矣取東西鄉犬頭取東西鄉犬頭燔冶燔冶飲飲夫妻相去夫妻相去取其左麋直酒中取其左麋直酒中飲之飲之必得之必得之取雄隹左蚤四取雄隹左蚤四小女子左蚤四小女子左蚤四以鍪熬以鍪熬并冶并冶傅傅人得矣人得矣取兩雌隹尾取兩雌隹尾燔冶燔冶自飲之自飲之媚矣媚矣取其左麋直酒中取其左麋直酒中飲之飲之必得之必得之
